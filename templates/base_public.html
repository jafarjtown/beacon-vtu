{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Beacon{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{% static 'css/auth.css' %}">
<link rel="stylesheet" href="{% static 'css/links.css' %}">
{% block extra_head %}{% endblock %}
</head>
<body class="public-body">

<div class="auth-topbar">
  <a href="{% url 'core:landing' %}" class="logo">
    <span class="bars"><span></span><span></span><span></span><span></span></span>
    Beacon
  </a>
  <a href="{% url 'core:landing' %}" class="back">What is Beacon? →</a>
</div>

<main class="public-main">
  {% block content %}{% endblock %}
</main>

<footer class="public-footer">
  <p>Powered by Beacon · <a href="{% url 'accounts:register' %}" class="link-accent">Create a free account</a></p>
</footer>

</body>
</html>
