{% extends 'base.html' %}
{% block title %}Change Password{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row g-4">
        <div class="col-lg-3">
            <div class="card-glass p-3 sticky-top" style="top:80px;">
                <div class="nav flex-column nav-pills">
                    <a class="nav-link-custom" href="{% url 'accounts:profile' %}"><i class="fas fa-user me-2"></i> Profile</a>
                    <a class="nav-link-custom" href="{% url 'accounts:settings' %}"><i class="fas fa-cog me-2"></i> Settings</a>
                    <a class="nav-link-custom active" href="{% url 'accounts:change_password' %}"><i class="fas fa-lock me-2"></i> Password</a>
                    <a class="nav-link-custom text-danger" href="{% url 'accounts:delete_account' %}"><i class="fas fa-trash-alt me-2"></i> Delete Account</a>
                </div>
            </div>
        </div>
        <div class="col-lg-9">
            <div class="card-glass p-4">
                <h5 class="fw-bold mb-4"><i class="fas fa-key me-2 text-primary"></i>Change Password</h5>
                <form method="post" novalidate>
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label small fw-semibold">Current Password</label>
                        {{ form.old_password }}
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-semibold">New Password</label>
                        {{ form.new_password1 }}
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-semibold">Confirm New Password</label>
                        {{ form.new_password2 }}
                    </div>
                    <button type="submit" class="btn btn-primary-custom">
                        <i class="fas fa-save me-2"></i>Update Password
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
