{% extends 'base.html' %}
{% block title %}Delete Account{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row g-4 justify-content-center">
        <div class="col-lg-6">
            <div class="card-glass p-4 border-danger">
                <div class="text-center mb-4">
                    <div class="rounded-circle bg-danger bg-opacity-10 text-danger d-inline-flex align-items-center justify-content-center mb-3" style="width:80px;height:80px;font-size:2rem;">
                        <i class="fas fa-exclamation-triangle"></i>
                    </div>
                    <h4 class="fw-bold text-danger">Delete Account</h4>
                    <p class="text-muted">This action is irreversible. All your data will be permanently deleted.</p>
                </div>
                <form method="post" onsubmit="return confirm('Are you absolutely sure? This cannot be undone.');">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label small fw-semibold">Enter your password to confirm</label>
                        <input type="password" name="password" class="form-control" required placeholder="Your current password">
                    </div>
                    <button type="submit" class="btn btn-danger w-100">
                        <i class="fas fa-trash-alt me-2"></i>Permanently Delete Account
                    </button>
                </form>
                <div class="text-center mt-3">
                    <a href="{% url 'accounts:profile' %}" class="text-decoration-none small">Cancel and go back</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
