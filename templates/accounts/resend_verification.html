{% extends 'base.html' %}
{% block title %}Resend Verification{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-5 col-md-7">
            <div class="card-glass p-4 p-md-5" data-aos="fade-up">
                <div class="text-center mb-4">
                    <div class="service-icon mx-auto mb-3">
                        <i class="fas fa-envelope"></i>
                    </div>
                    <h3 class="fw-bold">Resend Verification</h3>
                    <p class="text-muted">Enter your email to receive a new verification link</p>
                </div>
                
                <form method="post" novalidate>
                    {% csrf_token %}
                    <div class="mt-3">
                        <label class="form-label small fw-semibold">Email Address</label>
                        <input type="email" name="email" class="form-control" placeholder="your@email.com" required>
                    </div>
                    
                    <button type="submit" class="btn btn-primary-custom w-100 mt-4">
                        <i class="fas fa-paper-plane me-2"></i>Resend Email
                    </button>
                </form>
                
                <div class="text-center mt-4">
                    <a href="{% url 'accounts:login' %}" class="text-decoration-none small" style="color:var(--primary-color);">
                        <i class="fas fa-arrow-left me-1"></i> Back to Login
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
